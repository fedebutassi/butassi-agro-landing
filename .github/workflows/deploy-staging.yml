name: Deploy Staging

on:
  push:
    branches: [develop]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-staging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ vars.VITE_SUPABASE_PROJECT_ID }}
          VITE_CONTACT_EMAIL: ${{ vars.VITE_CONTACT_EMAIL }}
          VITE_WHATSAPP_NUMBER: ${{ vars.VITE_WHATSAPP_NUMBER }}
          VITE_FACEBOOK_URL: ${{ vars.VITE_FACEBOOK_URL }}
          VITE_INSTAGRAM_URL: ${{ vars.VITE_INSTAGRAM_URL }}
          VITE_LINKEDIN_URL: ${{ vars.VITE_LINKEDIN_URL }}
          VITE_GA_MEASUREMENT_ID: ${{ vars.VITE_GA_MEASUREMENT_ID_STAGING }}
          VITE_SENTRY_DSN: ${{ vars.VITE_SENTRY_DSN }}
      - name: SPA fallback
        run: cp dist/index.html dist/404.html
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: staging-build
          path: ./dist
          retention-days: 3
